<!-- @dsCard group="Components" viewport="700x420" subtitle="Button, Input, Select, Checkbox, Radio" name="Formularios" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body style="margin:0;font-family:var(--unx-font-sans);background:#fff;padding:20px;">
<div id="root"></div>
<script type="text/babel">
const NAMES = ['Button', 'Input', 'Select', 'Checkbox', 'Radio'];

function findNS() {
  for (const k of Object.getOwnPropertyNames(window)) {
    try {
      const v = window[k];
      if (v && typeof v === 'object' && NAMES.every(n => typeof v[n] === 'function')) return v;
    } catch (e) {}
  }
  return null;
}

async function loadBundle() {
  await new Promise(res => {
    const s = document.createElement('script');
    s.src = '../../_ds_bundle' + '.js';
    s.onload = res; s.onerror = res;
    document.head.appendChild(s);
  });
  return findNS();
}

async function loadLocal() {
  const ex = {};
  for (const n of NAMES) {
    let src = await (await fetch(n + '.jsx')).text();
    src = src.replace(/^import .*$/gm, '').replace(/export function (\w+)/g, 'ex.$1 = function $1');
    eval(Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code);
  }
  return ex;
}

async function init() {
  const NS = findNS() || (await loadBundle()) || (await loadLocal());
  const { Button, Input, Select, Checkbox, Radio } = NS;

  function Demo() {
    const [check, setCheck] = React.useState(true);
    const [radio, setRadio] = React.useState('a');
    return (
      <div style={{ display: 'grid', gap: 20 }}>
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center' }}>
          <Button variant="primary">Iniciar simulacro</Button>
          <Button variant="secondary">Ver resultados</Button>
          <Button variant="ghost">Omitir por ahora</Button>
          <Button variant="danger">Eliminar reactivo</Button>
          <Button variant="secondary" size="sm">Editar</Button>
          <Button variant="primary" disabled>Iniciar simulacro</Button>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16 }}>
          <Input label="Correo institucional" placeholder="nombre@institucion.edu.mx" />
          <Input label="Correo institucional" value="ana.lopez@" onChange={() => {}} error="Escribe un correo válido." />
          <Select label="Grupo" placeholder="Elige un grupo" options={[{value:'a',label:'Grupo A · Matutino'},{value:'b',label:'Grupo B · Vespertino'}]} />
        </div>
        <div style={{ display: 'flex', gap: 24, alignItems: 'center', flexWrap: 'wrap' }}>
          <Checkbox label="Incluir preguntas de repaso" checked={check} onChange={e => setCheck(e.target.checked)} />
          <Checkbox label="Deshabilitado" disabled />
          <Radio name="r" label="Opción A" checked={radio === 'a'} onChange={() => setRadio('a')} />
          <Radio name="r" label="Opción B" checked={radio === 'b'} onChange={() => setRadio('b')} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
}
init();
</script>
</body></html>
