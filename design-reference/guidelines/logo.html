<!-- @dsCard group="Brand" viewport="700x560" subtitle="Logotipo oficial UNX — color y blanco, con y sin eslogan" name="Logotipo" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="margin:0;font-family:var(--unx-font-sans);background:#fff;padding:20px;">
<div style="display:grid;gap:16px;">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    <figure style="margin:0;display:flex;flex-direction:column;gap:8px;">
      <div style="display:flex;align-items:center;justify-content:center;background:var(--unx-surface);border:1px solid var(--unx-border);border-radius:var(--unx-radius-card);padding:24px;height:180px;box-sizing:border-box;">
        <img src="../assets/logo/unx-logotipo.png" alt="Logotipo UN·X" style="max-height:100%;max-width:100%;">
      </div>
      <figcaption style="font-size:13px;color:var(--unx-text-muted);"><strong style="color:var(--unx-ink);">Logotipo</strong> · <code style="font-size:12px;">assets/logo/unx-logotipo.png</code> — sidebar, encabezados compactos y favicon.</figcaption>
    </figure>
    <figure style="margin:0;display:flex;flex-direction:column;gap:8px;">
      <div style="display:flex;align-items:center;justify-content:center;background:var(--unx-surface);border:1px solid var(--unx-border);border-radius:var(--unx-radius-card);padding:24px;height:180px;box-sizing:border-box;">
        <img src="../assets/logo/unx-logo-completo.png" alt="Logo UNX completo con eslogan" style="max-height:100%;max-width:100%;">
      </div>
      <figcaption style="font-size:13px;color:var(--unx-text-muted);"><strong style="color:var(--unx-ink);">Logo completo</strong> · <code style="font-size:12px;">assets/logo/unx-logo-completo.png</code> — login, onboarding y piezas donde la marca se presenta.</figcaption>
    </figure>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    <figure style="margin:0;display:flex;flex-direction:column;gap:8px;">
      <div style="display:flex;align-items:center;justify-content:center;background:var(--unx-blue);border-radius:var(--unx-radius-card);padding:24px;height:180px;box-sizing:border-box;">
        <img src="../assets/logo/unx-logotipo-blanco.png" alt="Logotipo UN·X blanco" style="max-height:100%;max-width:100%;">
      </div>
      <figcaption style="font-size:13px;color:var(--unx-text-muted);"><strong style="color:var(--unx-ink);">Logotipo blanco</strong> · <code style="font-size:12px;">assets/logo/unx-logotipo-blanco.png</code> — sobre azul UNX u oscuros (banda de correos, hero azul).</figcaption>
    </figure>
    <figure style="margin:0;display:flex;flex-direction:column;gap:8px;">
      <div style="display:flex;align-items:center;justify-content:center;background:var(--unx-blue);border-radius:var(--unx-radius-card);padding:24px;height:180px;box-sizing:border-box;">
        <img src="../assets/logo/unx-logo-completo-blanco.png" alt="Logo UNX completo blanco" style="max-height:100%;max-width:100%;">
      </div>
      <figcaption style="font-size:13px;color:var(--unx-text-muted);"><strong style="color:var(--unx-ink);">Logo completo blanco</strong> · <code style="font-size:12px;">assets/logo/unx-logo-completo-blanco.png</code> — versión con eslogan para fondos azules.</figcaption>
    </figure>
  </div>
  <div style="font-size:13px;line-height:19px;color:var(--unx-text);background:var(--unx-blue-tint);border-radius:var(--unx-radius-control);padding:12px 16px;">
    <strong>Reglas:</strong> nunca recolorear ni deformar; sobre fondos claros usar la versión a color, sobre azul UNX u oscuros la blanca. Origen vectorial: <code style="font-size:12px;">Identidad UN-X/2. Diseños Arantza Meneses/Logos LC-UNX.ai</code> (pedir exportación SVG para producción).
  </div>
</div>
</body></html>
