<!-- @dsCard group="Pantallas" viewport="390x844" name="Diseño 27 — Revisión de respuestas" subtitle="Alumna · Móvil · armada con componentes" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Diseño 27 — Revisión de respuestas</title>
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--unx-bg); }
  body { font-family: var(--unx-font-sans); color: var(--unx-text); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="_load.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
async function init() {
  const { AnswerOption, Tabs, Badge, Button } = await UNXScreen.load(['AnswerOption', 'Tabs', 'Badge', 'Button']);

  const Stage = ({ children }) => <div style={{ display: 'flex', flexWrap: 'wrap', gap: 32, padding: '24px 40px 48px', alignItems: 'flex-start' }}>{children}</div>;
  const Cell = ({ label, children }) => <div><div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 12, letterSpacing: '0.06em', color: 'var(--unx-text-muted)', textTransform: 'uppercase', marginBottom: 10 }}>{label}</div>{children}</div>;
  const Phone = ({ current, tab, children, footer = true }) => (
    <div style={{ width: 390, height: 800, background: 'var(--unx-bg)', border: '1px solid var(--unx-border-strong)', borderRadius: 28, boxShadow: 'var(--unx-shadow-md)', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '16px 20px 4px', background: '#fff', borderBottom: '1px solid var(--unx-border)' }}>
        <div style={{ font: 'var(--unx-caption)', color: 'var(--unx-text-muted)' }}>Revisión — Simulacro General 2</div>
        <div style={{ font: 'var(--unx-h3)', color: 'var(--unx-ink)', margin: '2px 0 8px' }}>Pregunta {current} de 90</div>
        <Tabs tabs={[{ id: 'todas', label: 'Todas' }, { id: 'inc', label: 'Incorrectas' }, { id: 'sin', label: 'Sin responder' }]} activeId={tab} />
      </div>
      <div style={{ flex: 1, overflow: 'auto', padding: 20 }}>{children}</div>
      {footer && <div style={{ display: 'flex', gap: 12, padding: '12px 20px', background: '#fff', borderTop: '1px solid var(--unx-border)' }}><Button variant="secondary" fullWidth>Anterior</Button><Button variant="primary" fullWidth>Siguiente</Button></div>}
    </div>
  );
  const areaTag = (t) => <div style={{ display: 'inline-block', background: 'var(--unx-purple-tint)', color: 'var(--unx-purple)', borderRadius: 999, padding: '3px 10px', fontSize: 12, fontWeight: 600, marginBottom: 14 }}>{t}</div>;
  const Why = ({ children }) => (
    <div style={{ background: 'var(--unx-yellow-tint)', borderRadius: 10, padding: 14, marginTop: 16 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, font: 'var(--unx-small)', fontWeight: 600, color: 'var(--unx-ink)', marginBottom: 6 }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/></svg>¿Por qué?</div>
      <p style={{ font: 'var(--unx-small)', color: 'var(--unx-text)', margin: 0, lineHeight: 1.5 }}>{children}</p>
    </div>
  );

  function App() {
    return (
      <Stage>
        <Cell label="1 · Pregunta incorrecta">
          <Phone current={12} tab="inc">
            <p style={{ font: 'var(--unx-h3)', color: 'var(--unx-ink)', margin: '0 0 6px', lineHeight: 1.4 }}>Si 3x + 5 = 20, ¿cuánto vale x?</p>
            {areaTag('Álgebra — Ecuaciones lineales')}
            <div style={{ display: 'grid', gap: 10 }}>
              <AnswerOption letter="A" state="normal">x = 3</AnswerOption>
              <AnswerOption letter="B" state="incorrect" tagText="Tu respuesta">x = 7</AnswerOption>
              <AnswerOption letter="C" state="correct" tagText="Respuesta correcta">x = 5</AnswerOption>
              <AnswerOption letter="D" state="normal">x = 15</AnswerOption>
            </div>
            <Why>Resta 5 en ambos lados: 3x = 15. Divide entre 3: x = 5. Elegir 7 es común si primero divides y luego restas — el orden importa.</Why>
          </Phone>
        </Cell>

        <Cell label="2 · Pregunta correcta">
          <Phone current={15} tab="todas">
            <p style={{ font: 'var(--unx-h3)', color: 'var(--unx-ink)', margin: '0 0 6px', lineHeight: 1.4 }}>Un tren recorre 240 km en 3 horas. ¿Cuántos km recorrerá en 5 horas?</p>
            {areaTag('Aritmética — Proporcionalidad')}
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'var(--unx-green-tint)', color: 'var(--unx-green)', borderRadius: 8, padding: '8px 12px', font: 'var(--unx-small)', fontWeight: 600, marginBottom: 14 }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>¡Bien! Tu respuesta es correcta</div>
            <div style={{ display: 'grid', gap: 10 }}>
              <AnswerOption letter="A" state="normal">320 km</AnswerOption>
              <AnswerOption letter="B" state="correct" tagText="Tu respuesta">400 km</AnswerOption>
              <AnswerOption letter="C" state="normal">360 km</AnswerOption>
              <AnswerOption letter="D" state="normal">480 km</AnswerOption>
            </div>
            <Why>La velocidad es 240 ÷ 3 = 80 km/h. En 5 horas: 80 × 5 = 400 km. Dominar esta regla de tres te ahorra tiempo en el examen.</Why>
          </Phone>
        </Cell>

        <Cell label="3 · Pregunta de lectura + mapa">
          <Phone current={34} tab="todas" footer={false}>
            <div style={{ background: '#fff', border: '1px solid var(--unx-border)', borderRadius: 10, padding: 14, marginBottom: 14 }}>
              <div style={{ fontWeight: 600, color: 'var(--unx-ink)', marginBottom: 4 }}>El calentamiento global y los océanos</div>
              <div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 11, letterSpacing: '0.05em', color: 'var(--unx-blue)', textTransform: 'uppercase' }}>Pregunta 3 de 5 de esta lectura</div>
            </div>
            <p style={{ font: 'var(--unx-body)', color: 'var(--unx-ink)', margin: '0 0 12px' }}>Según el texto, ¿por qué aumenta el nivel del mar al calentarse el agua?</p>
            <div style={{ display: 'grid', gap: 10 }}>
              <AnswerOption letter="A" state="normal">Porque llueve más sobre los océanos</AnswerOption>
              <AnswerOption letter="B" state="correct" tagText="Tu respuesta">Porque el agua se expande al calentarse</AnswerOption>
              <AnswerOption letter="C" state="normal">Porque el pH del agua disminuye</AnswerOption>
            </div>
            <div style={{ marginTop: 16, borderTop: '1px solid var(--unx-border)', paddingTop: 14 }}>
              <div style={{ font: 'var(--unx-small)', fontWeight: 600, color: 'var(--unx-ink)', marginBottom: 8 }}>Mapa de preguntas</div>
              <div style={{ display: 'flex', gap: 14, font: 'var(--unx-caption)', color: 'var(--unx-text-muted)', marginBottom: 10 }}><span style={{ color: 'var(--unx-green)' }}>● Correctas</span><span style={{ color: 'var(--unx-error)' }}>● Incorrectas</span><span>● Sin responder</span></div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(8, 1fr)', gap: 6 }}>
                {[['1', 'g'], ['2', 'g'], ['3', 'r'], ['4', 'g'], ['5', 'g'], ['6', 'r'], ['7', 'g'], ['8', 'g']].map(([n, s]) => (
                  <span key={n} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 34, height: 34, borderRadius: 8, fontSize: 13, fontWeight: 600, background: s === 'g' ? 'var(--unx-green-tint)' : 'var(--unx-error-tint)', color: s === 'g' ? 'var(--unx-green)' : 'var(--unx-error)' }}>{n}</span>
                ))}
              </div>
            </div>
          </Phone>
        </Cell>
      </Stage>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
init();
</script>
</body>
</html>
