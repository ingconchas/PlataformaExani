<!-- @dsCard group="Pantallas" viewport="1440x900" name="Diseño 12 — Resumen de exámenes" subtitle="Administradora · Desktop · armada con componentes" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Diseño 12 — Resumen de exámenes</title>
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--unx-bg); }
  body { font-family: var(--unx-font-sans); color: var(--unx-text); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="_load.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const MAYRA = [
  { id: 'inicio', label: 'Inicio', icon: 'inicio' },
  { id: 'alumnos', label: 'Alumnos', icon: 'alumnos' },
  { id: 'grupos', label: 'Grupos', icon: 'grupos' },
  { id: 'permisos', label: 'Usuarios y permisos', icon: 'permisos' },
  { id: 'temario', label: 'Temario', icon: 'temario' },
  { id: 'resumen', label: 'Resumen de exámenes', icon: 'resumen' },
];

async function init() {
  const { SidebarNav, PageHeader, Breadcrumb, Select, DataTable, MetricCard } =
    await UNXScreen.load(['SidebarNav', 'PageHeader', 'Breadcrumb', 'Select', 'DataTable', 'MetricCard']);

  const Label = ({ children }) => (
    <div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 13, letterSpacing: '0.06em', color: 'var(--unx-text-muted)', textTransform: 'uppercase', padding: '0 40px 10px' }}>{children}</div>
  );
  const Shell = ({ children }) => (
    <div style={{ display: 'flex', height: 900, background: 'var(--unx-bg)', overflow: 'hidden', border: '1px solid var(--unx-border)' }}>
      <SidebarNav user={{ name: 'Mayra Torres', role: 'Administradora' }} items={MAYRA} activeId="resumen" />
      <main style={{ flex: 1, overflow: 'auto', padding: 32 }}>{children}</main>
    </div>
  );

  const part = (a, b) => (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
      <span style={{ fontVariantNumeric: 'tabular-nums', whiteSpace: 'nowrap' }}>{a} de {b}</span>
      <span style={{ width: 60, height: 6, borderRadius: 3, background: 'var(--unx-border)', overflow: 'hidden' }}><span style={{ display: 'block', width: (a / b * 100) + '%', height: '100%', background: 'var(--unx-blue)' }} /></span>
    </span>
  );
  const prom = (n) => <span style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 20, color: 'var(--unx-blue)', fontVariantNumeric: 'tabular-nums' }}>{n}</span>;
  const sec = (t) => <span style={{ color: 'var(--unx-text-muted)', fontSize: 14 }}>{t}</span>;
  const COLS = [
    { key: 'examen', label: 'Examen' }, { key: 'fecha', label: 'Fecha' }, { key: 'part', label: 'Participantes' },
    { key: 'prom', label: 'Promedio', align: 'right' }, { key: 'sec', label: 'Aciertos por sección' },
  ];
  const E = (n, f, a, b, p, s) => ({ examen: <b style={{ color: 'var(--unx-ink)' }}>{n}</b>, fecha: sec(f), part: part(a, b), prom: prom(p), sec: sec(s) });

  const GroupBlock = ({ title, sub, rows }) => (
    <div style={{ marginBottom: 24 }}>
      <div style={{ padding: '10px 4px' }}><span style={{ font: 'var(--unx-h3)', color: 'var(--unx-ink)' }}>{title}</span><span style={{ font: 'var(--unx-small)', color: 'var(--unx-text-muted)', marginLeft: 12 }}>{sub}</span></div>
      {rows ? <DataTable columns={COLS} rows={rows} /> : <div style={{ background: '#fff', border: '1px solid var(--unx-border)', borderRadius: 10, boxShadow: 'var(--unx-shadow-sm)', padding: 24, color: 'var(--unx-text-muted)', font: 'var(--unx-small)' }}>Este grupo aún no tiene simulacros aplicados.</div>}
    </div>
  );

  function App() {
    return (
      <div style={{ display: 'grid', gap: 40, padding: '24px 0 48px' }}>
        <div>
          <Label>01 · Resumen por grupo</Label>
          <Shell>
            <PageHeader title="Resumen de exámenes" subtitle="Todas las cifras usan el primer intento de cada alumno.">
              <div style={{ width: 190 }}><Select options={[{ value: 't', label: 'Todos los grupos' }, { value: 'ma', label: 'Matutino A' }]} value="t" /></div>
              <div style={{ width: 130 }}><Select options={[{ value: 'b', label: '2026-B' }, { value: 'a', label: '2026-A' }]} value="b" /></div>
            </PageHeader>
            <GroupBlock title="Matutino A — Ciclo 2026-B" sub="3 simulacros aplicados" rows={[
              E('Simulacro General 2', '28 jun 2026', 28, 32, '1024', 'PM 18/30 · CL 22/30 · RI 20/30'),
              E('Simulacro General 1', '7 jun 2026', 31, 32, '986', 'PM 16/30 · CL 21/30 · RI 19/30'),
              E('Diagnóstico por áreas', '17 may 2026', 32, 32, '942', 'PM 15/30 · CL 20/30 · RI 18/30'),
            ]} />
            <GroupBlock title="Vespertino B — Ciclo 2026-B" sub="2 simulacros aplicados" rows={[
              E('Simulacro General 2', '27 jun 2026', 21, 26, '903', 'PM 13/30 · CL 19/30 · RI 18/30'),
              E('Simulacro General 1', '6 jun 2026', 24, 26, '958', 'PM 15/30 · CL 20/30 · RI 19/30'),
            ]} />
            <GroupBlock title="Intensivo Sabatino — Ciclo 2026-B" sub="" rows={null} />
          </Shell>
        </div>

        <div>
          <Label>02 · Destino al entrar · vista de solo lectura</Label>
          <Shell>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, background: '#F3F4F6', border: '1px solid var(--unx-border)', borderRadius: 8, padding: '10px 14px', marginBottom: 16, font: 'var(--unx-small)', color: 'var(--unx-text)' }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--unx-text-muted)" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <b>Vista de solo lectura</b> — los resultados de un simulacro aplicado no se pueden modificar
            </div>
            <Breadcrumb items={[{ label: 'Resumen de exámenes', href: '#' }, { label: 'Simulacro General 2 · Matutino A' }]} />
            <div style={{ marginTop: 8 }}><PageHeader title="Simulacro General 2 — Matutino A" subtitle="Aplicado el 28 de junio de 2026 · 28 de 32 participantes · primer intento" /></div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
              <MetricCard value="1024" label="Puntaje promedio" accent="var(--unx-blue)" tint="var(--unx-blue-tint)" />
              <MetricCard value="1156" label="Puntaje más alto" accent="var(--unx-green)" tint="var(--unx-green-tint)" />
              <MetricCard value="861" label="Puntaje más bajo" accent="var(--unx-orange-text)" tint="var(--unx-yellow-tint)" />
            </div>
          </Shell>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
init();
</script>
</body>
</html>
