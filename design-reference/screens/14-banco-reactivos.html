<!-- @dsCard group="Pantallas" viewport="1440x900" name="Diseño 14 — Banco de reactivos" subtitle="Instructor · Desktop · armada con componentes" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Diseño 14 — Banco de reactivos</title>
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--unx-bg); }
  body { font-family: var(--unx-font-sans); color: var(--unx-text); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="_load.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const ALEJANDRO = [
  { id: 'inicio', label: 'Inicio', icon: 'inicio' },
  { id: 'reactivos', label: 'Banco de reactivos', icon: 'reactivos' },
  { id: 'examenes', label: 'Exámenes', icon: 'examenes' },
];
const TINTS = { AR: ['var(--unx-blue-tint)', 'var(--unx-blue)'], DP: ['var(--unx-green-tint)', 'var(--unx-green)'], CL: ['var(--unx-purple-tint)', 'var(--unx-purple)'], RC: ['var(--unx-yellow-tint)', 'var(--unx-orange-text)'] };

async function init() {
  const { SidebarNav, PageHeader, SearchInput, Select, DataTable, Button, DifficultyMeter, Badge } =
    await UNXScreen.load(['SidebarNav', 'PageHeader', 'SearchInput', 'Select', 'DataTable', 'Button', 'DifficultyMeter', 'Badge']);

  const Label = ({ children }) => (
    <div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 13, letterSpacing: '0.06em', color: 'var(--unx-text-muted)', textTransform: 'uppercase', padding: '0 40px 10px' }}>{children}</div>
  );
  const Shell = ({ children }) => (
    <div style={{ display: 'flex', height: 900, background: 'var(--unx-bg)', overflow: 'hidden', border: '1px solid var(--unx-border)' }}>
      <SidebarNav user={{ name: 'Alejandro Ruiz', role: 'Instructor' }} items={ALEJANDRO} activeId="reactivos" />
      <main style={{ flex: 1, overflow: 'auto', padding: 32 }}>{children}</main>
    </div>
  );
  const autor = (ini, n) => { const [bg, fg] = TINTS[ini]; return <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}><span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 26, height: 26, borderRadius: '50%', background: bg, color: fg, fontSize: 11, fontWeight: 600 }}>{ini}</span><span style={{ font: 'var(--unx-small)' }}>{n}</span></span>; };
  const dm = (lvl) => <DifficultyMeter level={lvl} size="chip" showLabel />;
  const enun = (t, lectura) => <span><b style={{ color: 'var(--unx-ink)', fontWeight: 500 }}>{t}</b>{lectura && <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, marginTop: 4, background: 'var(--unx-blue-tint)', color: 'var(--unx-blue)', borderRadius: 999, padding: '2px 8px', fontSize: 12, width: 'fit-content' }}>▤ Lectura: El calentamiento global</span>}</span>;
  const edit = <button type="button" style={{ width: 32, height: 32, border: '1px solid var(--unx-border)', borderRadius: 8, background: '#fff', color: 'var(--unx-blue)', cursor: 'pointer' }}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" style={{ verticalAlign: 'middle' }}><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>;
  const locked = <span title="En uso en un examen activo" style={{ display: 'inline-flex', width: 32, height: 32, alignItems: 'center', justifyContent: 'center', color: 'var(--unx-text-muted)' }}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>;

  const COLS = [
    { key: 'enun', label: 'Enunciado' }, { key: 'seccion', label: 'Sección' }, { key: 'area', label: 'Área' },
    { key: 'subtema', label: 'Subtema' }, { key: 'dif', label: 'Dificultad' }, { key: 'autor', label: 'Autor' }, { key: 'acc', label: 'Acciones', align: 'right' },
  ];
  const m = (s) => <span style={{ color: 'var(--unx-text-muted)', fontSize: 14 }}>{s}</span>;
  const ROWS = [
    { enun: enun('Si 3x + 5 = 20, ¿cuál es el valor de x?'), seccion: m('Pensamiento matemático'), area: m('Álgebra'), subtema: m('Ecuaciones lineales'), dif: dm('facil'), autor: autor('AR', 'Alejandro Ruiz'), acc: locked },
    { enun: enun('Resuelve el sistema: 2x + y = 7; x − y = 2'), seccion: m('Pensamiento matemático'), area: m('Álgebra'), subtema: m('Sistemas de ecuaciones'), dif: dm('medio'), autor: autor('AR', 'Alejandro Ruiz'), acc: edit },
    { enun: enun('Desarrolla el producto notable (a + b)²'), seccion: m('Pensamiento matemático'), area: m('Álgebra'), subtema: m('Productos notables'), dif: dm('facil'), autor: autor('DP', 'Diana Peña'), acc: '' },
    { enun: enun('Según el texto, ¿cuál es la idea principal del segundo párrafo?', true), seccion: m('Comprensión lectora'), area: m('Textos expositivos'), subtema: m('Idea principal'), dif: dm('medio'), autor: autor('CL', 'Carlos Lora'), acc: '' },
    { enun: enun('Elige la oración con la puntuación correcta.'), seccion: m('Redacción indirecta'), area: m('Puntuación'), subtema: m('Uso de comas'), dif: dm('medio'), autor: autor('CL', 'Carlos Lora'), acc: '' },
    { enun: enun('Un tren recorre 240 km en 3 horas. ¿Cuántos km en 5 horas?'), seccion: m('Pensamiento matemático'), area: m('Aritmética'), subtema: m('Proporcionalidad'), dif: dm('facil'), autor: autor('AR', 'Alejandro Ruiz'), acc: edit },
    { enun: enun('¿Qué figura completa la serie lógica mostrada?'), seccion: m('Pensamiento matemático'), area: m('Geometría'), subtema: m('Sucesiones'), dif: dm('dificil'), autor: autor('DP', 'Diana Peña'), acc: '' },
    { enun: enun('Calcula el interés simple de un préstamo de $12,000 al 8% anual a 6 meses.'), seccion: m('Matemáticas financieras'), area: m('Interés'), subtema: m('Interés simple'), dif: dm('dificil'), autor: autor('RC', 'Rubén Cano'), acc: '' },
  ];
  const filtros = ['Sección: todas', 'Área: todas', 'Subtema: todos', 'Dificultad: todas', 'Autor: todos'];

  function App() {
    return (
      <div style={{ display: 'grid', gap: 40, padding: '24px 0 48px' }}>
        <div>
          <Label>01 · Banco de reactivos</Label>
          <Shell>
            <PageHeader title="Banco de reactivos" subtitle="312 reactivos · banco institucional: todos ven todo, cada reactivo muestra su autor" actionLabel="Crear reactivo">
              <Button variant="secondary">Crear lectura</Button>
            </PageHeader>
            <div style={{ display: 'flex', gap: 10, marginBottom: 16, flexWrap: 'wrap' }}>
              <div style={{ flex: 1, minWidth: 220 }}><SearchInput placeholder="Buscar en el enunciado…" fullWidth /></div>
              {filtros.map((f) => <div key={f} style={{ width: 150 }}><Select options={[{ value: 'x', label: f }]} value="x" /></div>)}
            </div>
            <DataTable columns={COLS} rows={ROWS} page={1} pageCount={39} />
            <p style={{ font: 'var(--unx-small)', color: 'var(--unx-text-muted)', marginTop: 12 }}>Editar aparece solo en tus propios reactivos; los administradores pueden editar todos.</p>
          </Shell>
        </div>

        <div>
          <Label>02 · Filtro sin resultados</Label>
          <Shell>
            <PageHeader title="Banco de reactivos" subtitle="312 reactivos" actionLabel="Crear reactivo"><Button variant="secondary">Crear lectura</Button></PageHeader>
            <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
              {['Pensamiento matemático', 'Productos notables', 'Avanzado'].map((c) => <span key={c} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: 'var(--unx-blue-tint)', color: 'var(--unx-blue)', borderRadius: 999, padding: '5px 12px', fontSize: 13, fontWeight: 600 }}>{c} ✕</span>)}
            </div>
            <DataTable columns={COLS} rows={[]} emptyTitle="No hay reactivos con esta combinación" emptyText="Prueba con otra dificultad o crea el primero de este subtema." emptyAction={<Button variant="primary">+ Crear reactivo</Button>} />
          </Shell>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
init();
</script>
</body>
</html>
