<!-- @dsCard group="Pantallas" viewport="1440x900" name="Diseño 11 — Gestión de temario" subtitle="Administradora · Desktop · armada con componentes" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Diseño 11 — Gestión de temario</title>
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--unx-bg); }
  body { font-family: var(--unx-font-sans); color: var(--unx-text); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="_load.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const MAYRA = [
  { id: 'inicio', label: 'Inicio', icon: 'inicio' },
  { id: 'alumnos', label: 'Alumnos', icon: 'alumnos' },
  { id: 'grupos', label: 'Grupos', icon: 'grupos' },
  { id: 'permisos', label: 'Usuarios y permisos', icon: 'permisos' },
  { id: 'temario', label: 'Temario', icon: 'temario' },
  { id: 'resumen', label: 'Resumen de exámenes', icon: 'resumen' },
];

async function init() {
  const { SidebarNav, PageHeader, Badge, Button, Modal, Select, Input, Card } =
    await UNXScreen.load(['SidebarNav', 'PageHeader', 'Badge', 'Button', 'Modal', 'Select', 'Input', 'Card']);

  const Label = ({ children }) => (
    <div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 13, letterSpacing: '0.06em', color: 'var(--unx-text-muted)', textTransform: 'uppercase', padding: '0 40px 10px' }}>{children}</div>
  );
  const Shell = ({ children }) => (
    <div style={{ position: 'relative', display: 'flex', height: 820, background: 'var(--unx-bg)', overflow: 'hidden', border: '1px solid var(--unx-border)' }}>
      <SidebarNav user={{ name: 'Mayra Torres', role: 'Administradora' }} items={MAYRA} activeId="temario" />
      <main style={{ flex: 1, overflow: 'auto', padding: 32 }}>{children}</main>
    </div>
  );

  const count = (n) => <span style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 13, color: 'var(--unx-text-muted)', fontVariantNumeric: 'tabular-nums' }}>{n} reactivos</span>;
  const Row = ({ depth, name, n, level, inactive }) => {
    const pad = 16 + depth * 28;
    const weight = level === 1 ? 600 : level === 2 ? 600 : 400;
    const size = level === 1 ? 16 : level === 2 ? 15 : 14;
    const color = level === 1 ? 'var(--unx-ink)' : 'var(--unx-text)';
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '11px 16px', paddingLeft: pad, borderBottom: '1px solid var(--unx-border)', background: level === 1 ? 'var(--unx-bg)' : '#fff' }}>
        {level < 3
          ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--unx-text-muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          : <span style={{ width: 16 }} />}
        <span style={{ flex: 1, fontWeight: weight, fontSize: size, color }}>{name}</span>
        {inactive && <Badge variant="neutral">Inactivo</Badge>}
        {count(n)}
        <span style={{ display: 'inline-flex', gap: 4, marginLeft: 8 }}>
          <IconBtn d={<><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></>} />
          <IconBtn d={<><circle cx="12" cy="12" r="9"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/></>} />
        </span>
      </div>
    );
  };
  const IconBtn = ({ d }) => <button type="button" style={{ width: 30, height: 30, border: 'none', borderRadius: 6, background: 'transparent', color: 'var(--unx-text-muted)', cursor: 'pointer' }}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={{ verticalAlign: 'middle' }}>{d}</svg></button>;

  function App() {
    return (
      <div style={{ display: 'grid', gap: 40, padding: '24px 0 48px' }}>
        <div>
          <Label>01 · Árbol de temario</Label>
          <Shell>
            <PageHeader title="Temario" subtitle="Catálogo institucional de contenidos — alimenta la clasificación de reactivos y las secciones de los exámenes" actionLabel="Agregar sección o módulo" />
            <div style={{ background: '#fff', border: '1px solid var(--unx-border)', borderRadius: 10, boxShadow: 'var(--unx-shadow-sm)', overflow: 'hidden' }}>
              <Row depth={0} level={1} name="Pensamiento matemático" n={86} />
              <Row depth={1} level={2} name="Aritmética" n={24} />
              <Row depth={1} level={2} name="Álgebra" n={32} />
              <Row depth={2} level={3} name="Ecuaciones lineales" n={14} />
              <Row depth={2} level={3} name="Sistemas de ecuaciones" n={10} />
              <Row depth={2} level={3} name="Productos notables" n={8} inactive />
              <Row depth={1} level={2} name="Geometría" n={30} />
              <Row depth={0} level={1} name="Comprensión lectora" n={58} />
              <Row depth={0} level={1} name="Redacción indirecta" n={44} />
              <div style={{ padding: '10px 16px', background: 'var(--unx-bg)', borderBottom: '1px solid var(--unx-border)', fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 12, letterSpacing: '0.06em', color: 'var(--unx-text-muted)' }}>MÓDULOS</div>
              <Row depth={0} level={1} name="Biología" n={26} />
              <Row depth={0} level={1} name="Matemáticas financieras" n={18} />
            </div>
            <p style={{ marginTop: 12, font: 'var(--unx-small)', color: 'var(--unx-text-muted)' }}>Los elementos desactivados no se ofrecen para contenido nuevo, pero conservan sus reactivos. Un elemento con reactivos asociados solo se puede desactivar, no eliminar.</p>
          </Shell>
        </div>

        <div>
          <Label>02 · Modal "Agregar elemento"</Label>
          <Shell>
            <PageHeader title="Temario" subtitle="Catálogo institucional de contenidos" actionLabel="Agregar sección o módulo" />
            <div style={{ opacity: 0.5 }}>
              <div style={{ background: '#fff', border: '1px solid var(--unx-border)', borderRadius: 10, height: 180 }} />
            </div>
            <Modal contained title="Agregar elemento"
              actions={<><Button variant="secondary">Cancelar</Button><Button variant="primary">Agregar</Button></>}>
              <div style={{ display: 'grid', gap: 16 }}>
                <Select label="Sección o módulo" options={[{ value: 'pm', label: 'Pensamiento matemático' }, { value: 'cl', label: 'Comprensión lectora' }, { value: 'ri', label: 'Redacción indirecta' }]} value="pm" />
                <Select label="Área temática (opcional)" placeholder="—" options={[{ value: 'alg', label: 'Álgebra' }, { value: 'ari', label: 'Aritmética' }, { value: 'geo', label: 'Geometría' }]} value="alg" />
                <p style={{ margin: '-4px 0 0', font: 'var(--unx-small)', color: 'var(--unx-text-muted)' }}>Si eliges un área, el elemento se creará como subtema; si no, como área de la sección.</p>
                <Input label="Nombre" placeholder="Desigualdades" />
              </div>
            </Modal>
          </Shell>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
init();
</script>
</body>
</html>
