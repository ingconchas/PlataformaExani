<!-- @dsCard group="Pantallas" viewport="390x844" name="Diseño 25 — Simulacro en curso" subtitle="Alumna · Móvil · sin navegación · armada con componentes" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Diseño 25 — Simulacro en curso</title>
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--unx-bg); }
  body { font-family: var(--unx-font-sans); color: var(--unx-text); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="_load.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
async function init() {
  const { ExamHeader, AnswerOption, Button } = await UNXScreen.load(['ExamHeader', 'AnswerOption', 'Button']);

  const Stage = ({ children }) => <div style={{ display: 'flex', flexWrap: 'wrap', gap: 32, padding: '24px 40px 48px', alignItems: 'flex-start' }}>{children}</div>;
  const Cell = ({ label, children }) => <div><div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 12, letterSpacing: '0.06em', color: 'var(--unx-text-muted)', textTransform: 'uppercase', marginBottom: 10 }}>{label}</div>{children}</div>;
  const Phone = ({ header, children, footer }) => (
    <div style={{ width: 390, height: 780, background: 'var(--unx-bg)', border: '1px solid var(--unx-border-strong)', borderRadius: 28, boxShadow: 'var(--unx-shadow-md)', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
      {header}
      <div style={{ flex: 1, overflow: 'auto', padding: 20 }}>{children}</div>
      {footer}
    </div>
  );
  const NavFoot = () => (
    <div style={{ display: 'flex', gap: 12, padding: '12px 20px', background: '#fff', borderTop: '1px solid var(--unx-border)' }}>
      <Button variant="secondary" fullWidth>Anterior</Button><Button variant="primary" fullWidth>Siguiente</Button>
    </div>
  );
  const saved = <div style={{ display: 'flex', alignItems: 'center', gap: 6, color: 'var(--unx-green)', font: 'var(--unx-small)', fontWeight: 600, marginTop: 14 }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Respuesta guardada</div>;
  const Q = ({ children }) => <p style={{ font: 'var(--unx-h3)', color: 'var(--unx-ink)', margin: '0 0 18px', lineHeight: 1.4 }}>{children}</p>;

  const mapCell = (n, st) => {
    const s = st === 'cur' ? { background: 'var(--unx-blue)', color: '#fff', borderColor: 'var(--unx-blue)' } : st === 'done' ? { background: 'var(--unx-blue-tint)', color: 'var(--unx-blue)', borderColor: 'var(--unx-blue-tint)' } : { background: '#fff', color: 'var(--unx-text)', borderColor: 'var(--unx-border-strong)' };
    return <span key={n} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 34, height: 34, borderRadius: 8, border: `1.5px solid ${s.borderColor}`, background: s.background, color: s.color, fontSize: 13, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{n}</span>;
  };
  const mapRow = (from, to, cur, doneUntil) => <div style={{ display: 'grid', gridTemplateColumns: 'repeat(8, 1fr)', gap: 6, marginBottom: 6 }}>{Array.from({ length: to - from + 1 }, (_, i) => from + i).map((n) => mapCell(n, n === cur ? 'cur' : n <= doneUntil ? 'done' : 'todo'))}</div>;

  function App() {
    return (
      <Stage>
        <Cell label="1 · Pregunta normal">
          <Phone header={<ExamHeader section="Pensamiento matemático" current={12} total={90} time="01:47:32" />} footer={<NavFoot />}>
            <Q>Si 3x + 5 = 20, ¿cuánto vale x?</Q>
            <div style={{ display: 'grid', gap: 10 }}>
              <AnswerOption letter="A" state="normal">x = 3</AnswerOption>
              <AnswerOption letter="B" state="selected">x = 5</AnswerOption>
              <AnswerOption letter="C" state="normal">x = 7</AnswerOption>
              <AnswerOption letter="D" state="normal">x = 15</AnswerOption>
            </div>
            {saved}
          </Phone>
        </Cell>

        <Cell label="1B · Pregunta con imagen">
          <Phone header={<ExamHeader section="Pensamiento matemático" current={13} total={90} time="01:45:10" />} footer={<NavFoot />}>
            <Q>¿Qué figura completa la serie mostrada?</Q>
            <div style={{ background: '#F3F4F6', borderRadius: 10, padding: 24, textAlign: 'center', marginBottom: 16, color: 'var(--unx-text-muted)' }}>
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
              <div style={{ font: 'var(--unx-caption)', marginTop: 6 }}>serie-figuras.png · <a href="#" style={{ color: 'var(--unx-blue)', fontWeight: 600, textDecoration: 'none' }}>Ampliar</a></div>
            </div>
            <div style={{ display: 'grid', gap: 10 }}>
              <AnswerOption letter="A" state="normal">Triángulo</AnswerOption><AnswerOption letter="B" state="selected">Cuadrado</AnswerOption><AnswerOption letter="C" state="normal">Pentágono</AnswerOption><AnswerOption letter="D" state="normal">Círculo</AnswerOption>
            </div>
          </Phone>
        </Cell>

        <Cell label="2 · Pregunta de lectura">
          <Phone header={<ExamHeader section="Comprensión lectora" current={34} total={90} time="01:12:08" />} footer={<NavFoot />}>
            <div style={{ background: '#fff', border: '1px solid var(--unx-border)', borderRadius: 10, padding: 14, marginBottom: 16 }}>
              <div style={{ fontWeight: 600, color: 'var(--unx-ink)', marginBottom: 6 }}>El calentamiento global y los océanos</div>
              <p style={{ font: 'var(--unx-small)', color: 'var(--unx-text)', margin: 0, lineHeight: 1.6 }}>Los océanos absorben cerca del 90% del exceso de calor generado por las emisiones de gases de efecto invernadero. El agua marina se expande al calentarse, lo que contribuye al aumento del nivel del mar. Además, el CO₂ disuelto reduce el pH del agua…</p>
            </div>
            <div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 12, letterSpacing: '0.05em', color: 'var(--unx-blue)', textTransform: 'uppercase', marginBottom: 8 }}>Pregunta 3 de 5 de esta lectura</div>
            <Q>Según el texto, ¿por qué aumenta el nivel del mar al calentarse el agua?</Q>
            <div style={{ display: 'grid', gap: 10 }}>
              <AnswerOption letter="A" state="normal">Porque llueve más sobre los océanos</AnswerOption><AnswerOption letter="B" state="selected">Porque el agua se expande al calentarse</AnswerOption><AnswerOption letter="C" state="normal">Porque el pH del agua disminuye</AnswerOption>
            </div>
          </Phone>
        </Cell>

        <Cell label="3 · Mapa de preguntas">
          <Phone header={<ExamHeader section="Pensamiento matemático" current={12} total={90} time="01:47:32" />} footer={<div style={{ padding: '12px 20px', background: '#fff', borderTop: '1px solid var(--unx-border)' }}><Button variant="primary" fullWidth>Ir a la pregunta</Button></div>}>
            <div style={{ font: 'var(--unx-h3)', color: 'var(--unx-ink)' }}>Mapa de preguntas</div>
            <div style={{ font: 'var(--unx-caption)', color: 'var(--unx-text-muted)', marginBottom: 14 }}>11 contestadas · 79 por contestar</div>
            <div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 11, letterSpacing: '0.05em', color: 'var(--unx-text-muted)', textTransform: 'uppercase', marginBottom: 6 }}>Pensamiento matemático · 1–30</div>
            {mapRow(1, 8, 12, 11)}{mapRow(9, 16, 12, 11)}{mapRow(17, 24, 12, 0)}{mapRow(25, 30, 12, 0)}
            <div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 11, letterSpacing: '0.05em', color: 'var(--unx-text-muted)', textTransform: 'uppercase', margin: '12px 0 6px' }}>Comprensión lectora · 31–60</div>
            {mapRow(31, 38, 0, 0)}{mapRow(39, 46, 0, 0)}
          </Phone>
        </Cell>

        <Cell label="4 · Advertencia de tiempo">
          <Phone header={<ExamHeader section="Redacción indirecta" current={87} total={90} time="00:05:00" alert />} footer={<NavFoot />}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'var(--unx-orange-tint)', color: 'var(--unx-orange-text)', borderRadius: 8, padding: '10px 14px', font: 'var(--unx-small)', fontWeight: 600, marginBottom: 16 }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>Quedan 5 minutos</div>
            <Q>Elige la oración con la puntuación correcta.</Q>
            <div style={{ display: 'grid', gap: 10 }}>
              <AnswerOption letter="A" state="selected">Antes de salir, revisa tus respuestas.</AnswerOption><AnswerOption letter="B" state="normal">Antes de salir revisa, tus respuestas.</AnswerOption><AnswerOption letter="C" state="normal">Antes, de salir revisa tus respuestas.</AnswerOption><AnswerOption letter="D" state="normal">Antes de salir revisa tus respuestas,</AnswerOption>
            </div>
          </Phone>
        </Cell>

        <Cell label="5 · Confirmar envío">
          <Phone header={<ExamHeader section="Redacción indirecta" current={90} total={90} time="00:12:40" />}>
            <div style={{ background: 'var(--unx-blue-tint)', borderRadius: 12, padding: 20, textAlign: 'center' }}>
              <span style={{ display: 'inline-flex', width: 48, height: 48, borderRadius: '50%', background: '#fff', color: 'var(--unx-blue)', alignItems: 'center', justifyContent: 'center', marginBottom: 12 }}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="m22 2-7 20-4-9-9-4Z"/></svg></span>
              <div style={{ font: 'var(--unx-h3)', color: 'var(--unx-ink)' }}>Vas a enviar tu simulacro</div>
              <p style={{ font: 'var(--unx-small)', color: 'var(--unx-text)', margin: '6px 0 18px' }}>87 de 90 contestadas. Las 3 sin responder cuentan como incorrectas.</p>
              <Button variant="secondary" fullWidth>Revisar pendientes</Button>
              <div style={{ height: 10 }} />
              <Button variant="primary" fullWidth>Enviar ahora</Button>
            </div>
          </Phone>
        </Cell>

        <Cell label="6 · Tiempo agotado / reconexión">
          <Phone header={<ExamHeader section="Simulacro" current={90} total={90} time="00:00:00" />}>
            <div style={{ display: 'grid', gap: 16 }}>
              <div style={{ background: '#fff', border: '1px solid var(--unx-border)', borderRadius: 12, padding: 20, textAlign: 'center' }}>
                <span style={{ display: 'inline-flex', width: 44, height: 44, borderRadius: '50%', background: 'var(--unx-orange-tint)', color: 'var(--unx-orange)', alignItems: 'center', justifyContent: 'center', marginBottom: 10 }}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 2"/></svg></span>
                <div style={{ font: 'var(--unx-h3)', color: 'var(--unx-ink)' }}>Se acabó el tiempo</div>
                <p style={{ font: 'var(--unx-small)', color: 'var(--unx-text-muted)', margin: '6px 0 14px' }}>Tu examen se envió automáticamente con tus respuestas guardadas.</p>
                <Button variant="primary" fullWidth>Ver mis resultados</Button>
              </div>
              <div style={{ background: '#fff', border: '1px solid var(--unx-border)', borderRadius: 12, padding: 20, textAlign: 'center' }}>
                <span style={{ display: 'inline-flex', width: 44, height: 44, borderRadius: '50%', background: 'var(--unx-blue-tint)', color: 'var(--unx-blue)', alignItems: 'center', justifyContent: 'center', marginBottom: 10 }}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg></span>
                <div style={{ font: 'var(--unx-h3)', color: 'var(--unx-ink)' }}>Perdiste conexión</div>
                <p style={{ font: 'var(--unx-small)', color: 'var(--unx-text-muted)', margin: '6px 0 14px' }}>Tu examen sigue corriendo en el servidor. Continúa en la pregunta 12 con el tiempo real transcurrido.</p>
                <Button variant="primary" fullWidth>Continuar</Button>
              </div>
            </div>
          </Phone>
        </Cell>
      </Stage>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
init();
</script>
</body>
</html>
