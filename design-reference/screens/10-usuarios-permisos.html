<!-- @dsCard group="Pantallas" viewport="1440x900" name="Diseño 10 — Usuarios y permisos" subtitle="Administradora · Desktop · armada con componentes" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Diseño 10 — Usuarios y permisos</title>
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--unx-bg); }
  body { font-family: var(--unx-font-sans); color: var(--unx-text); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="_load.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const MAYRA = [
  { id: 'inicio', label: 'Inicio', icon: 'inicio' },
  { id: 'alumnos', label: 'Alumnos', icon: 'alumnos' },
  { id: 'grupos', label: 'Grupos', icon: 'grupos' },
  { id: 'permisos', label: 'Usuarios y permisos', icon: 'permisos' },
  { id: 'temario', label: 'Temario', icon: 'temario' },
  { id: 'resumen', label: 'Resumen de exámenes', icon: 'resumen' },
];
const TINTS = { MT: ['var(--unx-blue-tint)', 'var(--unx-blue)'], CG: ['var(--unx-blue-tint)', 'var(--unx-blue)'], CL: ['var(--unx-purple-tint)', 'var(--unx-purple)'], DP: ['var(--unx-green-tint)', 'var(--unx-green)'], RC: ['var(--unx-yellow-tint)', 'var(--unx-orange-text)'] };

async function init() {
  const { SidebarNav, PageHeader, DataTable, Badge, Button, Modal, Input, Radio } =
    await UNXScreen.load(['SidebarNav', 'PageHeader', 'DataTable', 'Badge', 'Button', 'Modal', 'Input', 'Radio']);

  const Label = ({ children }) => (
    <div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 13, letterSpacing: '0.06em', color: 'var(--unx-text-muted)', textTransform: 'uppercase', padding: '0 40px 10px' }}>{children}</div>
  );
  const Shell = ({ children }) => (
    <div style={{ position: 'relative', display: 'flex', height: 760, background: 'var(--unx-bg)', overflow: 'hidden', border: '1px solid var(--unx-border)' }}>
      <SidebarNav user={{ name: 'Mayra Torres', role: 'Administradora' }} items={MAYRA} activeId="permisos" />
      <main style={{ flex: 1, overflow: 'auto', padding: 32 }}>{children}</main>
    </div>
  );
  const Ava = ({ ini }) => { const [bg, fg] = TINTS[ini] || TINTS.CG; return <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 32, height: 32, borderRadius: '50%', background: bg, color: fg, fontSize: 12, fontWeight: 600, flexShrink: 0 }}>{ini}</span>; };
  const persona = (ini, n, sub) => <span style={{ display: 'inline-flex', alignItems: 'center', gap: 10 }}><Ava ini={ini} /><span style={{ lineHeight: 1.2 }}><b style={{ color: 'var(--unx-ink)', display: 'block' }}>{n}</b>{sub && <span style={{ font: 'var(--unx-caption)', color: 'var(--unx-text-muted)' }}>{sub}</span>}</span></span>;
  const chips = (arr) => <span style={{ display: 'inline-flex', gap: 6, flexWrap: 'wrap' }}>{arr.map((g) => <span key={g} style={{ background: 'var(--unx-bg)', border: '1px solid var(--unx-border)', borderRadius: 999, padding: '2px 10px', fontSize: 13 }}>{g}</span>)}</span>;

  const COLS = [
    { key: 'nombre', label: 'Nombre' }, { key: 'correo', label: 'Correo' }, { key: 'rol', label: 'Rol' },
    { key: 'grupos', label: 'Grupos con acceso' }, { key: 'estado', label: 'Estado' }, { key: 'acciones', label: 'Acciones', align: 'right' },
  ];
  const editIcon = <button type="button" style={{ width: 34, height: 34, border: '1px solid var(--unx-border)', borderRadius: 8, background: '#fff', color: 'var(--unx-blue)', cursor: 'pointer' }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={{ verticalAlign: 'middle' }}><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>;
  const ROWS = [
    { nombre: persona('MT', 'Mayra Torres'), correo: <span style={{ color: 'var(--unx-text-muted)' }}>mayra.torres@institucion.edu.mx</span>, rol: <Badge variant="info-soft">Administradora</Badge>, grupos: <span style={{ color: 'var(--unx-text-muted)' }}>Todos</span>, estado: <Badge variant="success">Activo</Badge>, acciones: '' },
    { nombre: persona('CG', 'Cristian Gómez', 'Matemáticas'), correo: <span style={{ color: 'var(--unx-text-muted)' }}>cristian.gomez@institucion.edu.mx</span>, rol: <Badge variant="neutral">Instructor</Badge>, grupos: chips(['Matutino A', 'Vespertino B']), estado: <Badge variant="success">Activo</Badge>, acciones: editIcon },
    { nombre: persona('CL', 'Carlos Lora', 'Español'), correo: <span style={{ color: 'var(--unx-text-muted)' }}>carlos.lora@institucion.edu.mx</span>, rol: <Badge variant="neutral">Instructor</Badge>, grupos: chips(['Matutino A', 'Intensivo Sabatino']), estado: <Badge variant="success">Activo</Badge>, acciones: editIcon },
    { nombre: persona('DP', 'Diana Peña', 'Física'), correo: <span style={{ color: 'var(--unx-text-muted)' }}>diana.pena@institucion.edu.mx</span>, rol: <Badge variant="neutral">Instructor</Badge>, grupos: chips(['Vespertino A', 'Vespertino B']), estado: <Badge variant="success">Activo</Badge>, acciones: editIcon },
    { nombre: persona('RC', 'Rubén Cano', 'Historia'), correo: <span style={{ color: 'var(--unx-text-muted)' }}>ruben.cano@institucion.edu.mx</span>, rol: <Badge variant="neutral">Instructor</Badge>, grupos: chips(['Matutino B']), estado: <Badge variant="neutral">Inactivo</Badge>, acciones: editIcon },
  ];

  function App() {
    return (
      <div style={{ display: 'grid', gap: 40, padding: '24px 0 48px' }}>
        <div>
          <Label>01 · Cuentas del staff</Label>
          <Shell>
            <PageHeader title="Usuarios y permisos" subtitle="5 cuentas del staff" actionLabel="Crear cuenta" />
            <DataTable columns={COLS} rows={ROWS} />
          </Shell>
        </div>

        <div>
          <Label>02 · Modal "Crear cuenta"</Label>
          <Shell>
            <PageHeader title="Usuarios y permisos" subtitle="5 cuentas del staff" actionLabel="Crear cuenta" />
            <DataTable columns={COLS} rows={ROWS.slice(0, 3)} />
            <Modal contained title="Crear cuenta"
              actions={<><Button variant="secondary">Cancelar</Button><Button variant="primary">Crear cuenta y enviar invitación</Button></>}>
              <div style={{ display: 'grid', gap: 16 }}>
                <Input label="Nombre completo" placeholder="Laura Ibarra Fuentes" />
                <Input label="Correo electrónico" type="email" placeholder="laura.ibarra@institucion.edu.mx" />
                <div>
                  <div style={{ font: 'var(--unx-small)', fontWeight: 600, color: 'var(--unx-ink)', marginBottom: 8 }}>Rol</div>
                  <div style={{ display: 'flex', gap: 24 }}><Radio name="rol" label="Administrador" /><Radio name="rol" label="Instructor" checked /></div>
                </div>
                <div>
                  <div style={{ font: 'var(--unx-small)', fontWeight: 600, color: 'var(--unx-ink)', marginBottom: 8 }}>Grupos a los que tendrá acceso</div>
                  {chips(['Matutino B', 'Intensivo Sabatino', '+ Agregar grupo…'])}
                </div>
                <p style={{ margin: 0, font: 'var(--unx-small)', color: 'var(--unx-text-muted)' }}>Recibirá un correo de invitación para crear su contraseña.</p>
              </div>
            </Modal>
          </Shell>
        </div>

        <div>
          <Label>03 · Confirmación de desactivación</Label>
          <Shell>
            <PageHeader title="Usuarios y permisos" subtitle="5 cuentas del staff" actionLabel="Crear cuenta" />
            <DataTable columns={COLS} rows={ROWS.slice(0, 3)} />
            <Modal contained width={440} title="¿Desactivar la cuenta de Rubén Cano?"
              actions={<><Button variant="secondary">Cancelar</Button><Button variant="danger">Desactivar</Button></>}>
              <p style={{ margin: 0, font: 'var(--unx-body)', color: 'var(--unx-text)' }}>Esta cuenta perderá el acceso; su contenido creado se conserva.</p>
            </Modal>
          </Shell>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
init();
</script>
</body>
</html>
