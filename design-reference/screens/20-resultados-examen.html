<!-- @dsCard group="Pantallas" viewport="1440x900" name="Diseño 20 — Resultados del examen" subtitle="Instructor y administradora · Desktop · armada con componentes" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Diseño 20 — Resultados del examen</title>
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--unx-bg); }
  body { font-family: var(--unx-font-sans); color: var(--unx-text); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="_load.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const ALEJANDRO = [
  { id: 'inicio', label: 'Inicio', icon: 'inicio' },
  { id: 'reactivos', label: 'Banco de reactivos', icon: 'reactivos' },
  { id: 'examenes', label: 'Exámenes', icon: 'examenes' },
];
const MAYRA = [
  { id: 'inicio', label: 'Inicio', icon: 'inicio' }, { id: 'alumnos', label: 'Alumnos', icon: 'alumnos' },
  { id: 'grupos', label: 'Grupos', icon: 'grupos' }, { id: 'permisos', label: 'Usuarios y permisos', icon: 'permisos' },
  { id: 'temario', label: 'Temario', icon: 'temario' }, { id: 'resumen', label: 'Resumen de exámenes', icon: 'resumen' },
];

async function init() {
  const { SidebarNav, Breadcrumb, Card, Badge, Select, DataTable, HBarChart } =
    await UNXScreen.load(['SidebarNav', 'Breadcrumb', 'Card', 'Badge', 'Select', 'DataTable', 'HBarChart']);

  const Label = ({ children }) => (
    <div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 13, letterSpacing: '0.06em', color: 'var(--unx-text-muted)', textTransform: 'uppercase', padding: '0 40px 10px' }}>{children}</div>
  );
  const roLead = <div style={{ display: 'flex', alignItems: 'center', gap: 8, background: '#F3F4F6', border: '1px solid var(--unx-border)', borderRadius: 8, padding: '10px 14px', marginBottom: 16, font: 'var(--unx-small)', color: 'var(--unx-text)' }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--unx-text-muted)" strokeWidth="1.6"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><b>Vista de solo lectura</b> — Resumen de exámenes</div>;

  const bignum = (n, lbl) => <Card><div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 40, color: 'var(--unx-ink)', fontVariantNumeric: 'tabular-nums' }}>{n}</div><div style={{ font: 'var(--unx-small)', color: 'var(--unx-text-muted)' }}>{lbl}</div></Card>;
  const score = (n) => <span style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 18, color: 'var(--unx-blue)', fontVariantNumeric: 'tabular-nums' }}>{n}</span>;
  const sec = (t) => <span style={{ color: 'var(--unx-text-muted)', fontSize: 14, fontVariantNumeric: 'tabular-nums' }}>{t}</span>;
  const COLS = [{ key: 'alumno', label: 'Alumno' }, { key: 'puntaje', label: 'Puntaje', align: 'right' }, { key: 'mat', label: 'Matemáticas' }, { key: 'comp', label: 'Comprensión' }, { key: 'red', label: 'Redacción' }, { key: 'estado', label: 'Estado' }];
  const S = (n, p, m, c, r, done) => ({ alumno: <b style={{ color: 'var(--unx-ink)' }}>{n}</b>, puntaje: p === '—' ? sec('—') : score(p), mat: sec(m), comp: sec(c), red: sec(r), estado: done ? <Badge variant="success">Completado</Badge> : <Badge variant="achievement">Pendiente</Badge> });
  const ROWS = [
    S('Regina Ávila Mora', '1156', '24/30', '26/30', '23/30', true),
    S('Ana López Ramírez', '1128', '22/30', '25/30', '22/30', true),
    S('Valeria Cruz Núñez', '1075', '20/30', '23/30', '21/30', true),
    S('Emiliano Ríos Paz', '1043', '19/30', '22/30', '20/30', true),
    S('Ximena Salazar Ortiz', '1018', '18/30', '22/30', '19/30', true),
    S('Diego Martín Soto', '982', '15/30', '20/30', '18/30', true),
    S('Santiago Herrera Luna', '—', '—', '—', '—', false),
    S('Fernanda Gutiérrez Peña', '—', '—', '—', '—', false),
  ];

  const Body = ({ ro }) => (
    <>
      {!ro && <Breadcrumb items={[{ label: 'Exámenes', href: '#' }, { label: 'Simulacro General 2', href: '#' }, { label: 'Resultados' }]} />}
      <h1 style={{ margin: ro ? 0 : '8px 0 0', font: 'var(--unx-h1)', color: 'var(--unx-ink)' }}>Simulacro General 2 — Resultados</h1>
      <p style={{ margin: '4px 0 16px', font: 'var(--unx-small)', color: 'var(--unx-text-muted)' }}>Todas las cifras usan el primer intento (diagnóstico) de cada alumno; los repasos no alteran estos resultados.</p>
      <div style={{ display: 'flex', gap: 12, alignItems: 'center', marginBottom: 16 }}>
        <div style={{ width: 190 }}><Select options={[{ value: 'ma', label: 'Matutino A' }]} value="ma" /></div>
        <span style={{ font: 'var(--unx-small)', color: 'var(--unx-text-muted)' }}>Aplicado el 28 jun 2026</span>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16, marginBottom: 20 }}>
        {bignum('1024', 'Promedio del grupo · escala 700–1300')}
        <Card><div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 40, color: 'var(--unx-ink)', fontVariantNumeric: 'tabular-nums' }}>28 de 32</div><div style={{ height: 6, borderRadius: 3, background: 'var(--unx-border)', margin: '6px 0', overflow: 'hidden' }}><div style={{ width: '87%', height: '100%', background: 'var(--unx-green)' }} /></div><div style={{ font: 'var(--unx-small)', color: 'var(--unx-text-muted)' }}>Participación</div></Card>
        <Card><div style={{ font: 'var(--unx-h3)', color: 'var(--unx-ink)' }}>Comprensión lectora</div><div style={{ font: 'var(--unx-small)', color: 'var(--unx-text-muted)', marginTop: 6 }}>Mejor sección del grupo</div></Card>
      </div>
      <Card style={{ marginBottom: 20 }}>
        <div style={{ font: 'var(--unx-h3)', color: 'var(--unx-ink)' }}>Desempeño por área temática</div>
        <p style={{ margin: '4px 0 14px', font: 'var(--unx-small)', color: 'var(--unx-text-muted)' }}>Porcentaje de aciertos del grupo · insumo para planear la siguiente sesión · da clic en una materia para abrir sus áreas</p>
        <div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 12, letterSpacing: '0.05em', color: 'var(--unx-text-muted)', textTransform: 'uppercase', marginBottom: 8 }}>▾ Pensamiento matemático · 55%</div>
        <HBarChart data={[{ label: 'Álgebra', value: 48, display: '48%', highlight: true }, { label: 'Geometría', value: 55, display: '55%', highlight: true }, { label: 'Aritmética', value: 62, display: '62%' }]} highlightTag="reforzar en repaso" />
        <div style={{ display: 'grid', gap: 8, marginTop: 14 }}>
          {[['Redacción indirecta', 66], ['Comprensión lectora', 78]].map(([n, v]) => (
            <div key={n} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <span style={{ width: 180, font: 'var(--unx-small)', color: 'var(--unx-text)' }}>▸ {n}</span>
              <span style={{ flex: 1, height: 8, borderRadius: 4, background: '#F3F4F6', overflow: 'hidden' }}><span style={{ display: 'block', width: v + '%', height: '100%', background: 'var(--unx-blue)' }} /></span>
              <span style={{ width: 44, textAlign: 'right', font: 'var(--unx-small)', fontWeight: 600, color: 'var(--unx-ink)' }}>{v}%</span>
            </div>
          ))}
        </div>
      </Card>
      <DataTable columns={COLS} rows={ro ? ROWS.slice(0, 7) : ROWS} />
      {!ro && <p style={{ font: 'var(--unx-small)', color: 'var(--unx-text-muted)', marginTop: 12 }}>Al dar clic en un alumno se abre su ficha de progreso individual.</p>}
    </>
  );

  function App() {
    return (
      <div style={{ display: 'grid', gap: 40, padding: '24px 0 48px' }}>
        <div>
          <Label>01 · Resultados · instructor</Label>
          <div style={{ display: 'flex', height: 1000, background: 'var(--unx-bg)', overflow: 'hidden', border: '1px solid var(--unx-border)' }}>
            <SidebarNav user={{ name: 'Alejandro Ruiz', role: 'Instructor' }} items={ALEJANDRO} activeId="examenes" />
            <main style={{ flex: 1, overflow: 'auto', padding: 32 }}><Body /></main>
          </div>
        </div>
        <div>
          <Label>02 · Modo administradora · solo lectura</Label>
          <div style={{ display: 'flex', height: 1000, background: 'var(--unx-bg)', overflow: 'hidden', border: '1px solid var(--unx-border)' }}>
            <SidebarNav user={{ name: 'Mayra Torres', role: 'Administradora' }} items={MAYRA} activeId="resumen" />
            <main style={{ flex: 1, overflow: 'auto', padding: 32 }}>{roLead}<Body ro /></main>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
init();
</script>
</body>
</html>
