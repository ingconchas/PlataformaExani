<!-- @dsCard group="Pantallas" viewport="1440x900" name="Diseño 05 — Flujo de acceso" subtitle="Todos los roles · Web · armada con componentes" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Diseño 05 — Flujo de acceso</title>
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--unx-bg); }
  body { font-family: var(--unx-font-sans); color: var(--unx-text); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="../screens/_load.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
async function init() {
  const { Input, PasswordInput, Button, Alert } = await UNXScreen.load(['Input', 'PasswordInput', 'Button', 'Alert']);

  const Section = ({ label, children }) => (
    <div style={{ marginBottom: 40 }}>
      <div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 13, letterSpacing: '0.06em', color: 'var(--unx-text-muted)', textTransform: 'uppercase', margin: '0 auto 12px', maxWidth: 1040 }}>{label}</div>
      {children}
    </div>
  );

  const AuthCard = ({ width = 420, children }) => (
    <div style={{ display: 'flex', justifyContent: 'center', padding: '8px 16px' }}>
      <div style={{ width, maxWidth: '100%', background: 'var(--unx-surface)', border: '1px solid var(--unx-border)', borderRadius: 12, boxShadow: 'var(--unx-shadow-md)', padding: 32 }}>
        <img src="../assets/logo/unx-logo-completo.png" alt="UNX" style={{ height: 52, display: 'block', margin: '0 auto 24px' }} />
        {children}
        <p style={{ textAlign: 'center', font: 'var(--unx-caption)', color: 'var(--unx-text-muted)', margin: '24px 0 0' }}>UNX · Preparación para tu examen de admisión · unx.mx</p>
      </div>
    </div>
  );

  const H = ({ children, sub }) => (
    <div style={{ textAlign: 'center', marginBottom: 20 }}>
      <h1 style={{ margin: 0, font: 'var(--unx-h2)', color: 'var(--unx-ink)' }}>{children}</h1>
      {sub && <p style={{ margin: '4px 0 0', font: 'var(--unx-small)', color: 'var(--unx-text-muted)' }}>{sub}</p>}
    </div>
  );

  const Req = ({ ok, children }) => (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, font: 'var(--unx-small)', color: ok ? 'var(--unx-green)' : 'var(--unx-text-muted)', marginTop: 4 }}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      {children}
    </div>
  );

  const forgot = <div style={{ textAlign: 'right', marginTop: 6 }}><a href="#" style={{ font: 'var(--unx-small)', color: 'var(--unx-blue)', textDecoration: 'none' }}>¿Olvidaste tu contraseña?</a></div>;

  function App() {
    return (
      <div style={{ padding: '32px 0 48px' }}>
        <Section label="01 · Iniciar sesión · Desktop 1440">
          <AuthCard>
            <H>Bienvenido a UNX Simuladores</H>
            <div style={{ display: 'grid', gap: 16 }}>
              <Input label="Correo electrónico" type="email" placeholder="tucorreo@correo.com" />
              <div><PasswordInput label="Contraseña" placeholder="Tu contraseña" />{forgot}</div>
              <Button variant="primary" fullWidth>Ingresar</Button>
            </div>
          </AuthCard>
        </Section>

        <Section label="01B · Iniciar sesión · Estado de error">
          <AuthCard>
            <H>Bienvenido a UNX Simuladores</H>
            <div style={{ display: 'grid', gap: 16 }}>
              <Input label="Correo electrónico" type="email" value="fernanda@correo.com" />
              <div><PasswordInput label="Contraseña" value="contrasena" />{forgot}</div>
              <Alert variant="error">Correo o contraseña incorrectos</Alert>
              <Button variant="primary" fullWidth>Ingresar</Button>
            </div>
          </AuthCard>
        </Section>

        <Section label="01C · Iniciar sesión · Móvil 390">
          <AuthCard width={358}>
            <H>Bienvenido a UNX Simuladores</H>
            <div style={{ display: 'grid', gap: 16 }}>
              <Input label="Correo electrónico" type="email" placeholder="tucorreo@correo.com" />
              <div><PasswordInput label="Contraseña" placeholder="Tu contraseña" />{forgot}</div>
              <Button variant="primary" fullWidth>Ingresar</Button>
            </div>
          </AuthCard>
        </Section>

        <Section label="02 · Crear contraseña · Desde correo de invitación">
          <AuthCard>
            <H sub="Crea tu contraseña para empezar">Hola, Fernanda</H>
            <div style={{ display: 'grid', gap: 16 }}>
              <div>
                <PasswordInput label="Nueva contraseña" placeholder="Tu nueva contraseña" />
                <div style={{ marginTop: 8 }}>
                  <Req ok>Mínimo 8 caracteres</Req>
                  <Req>Una letra mayúscula</Req>
                  <Req>Un número</Req>
                </div>
              </div>
              <PasswordInput label="Confirmar contraseña" placeholder="Repite tu contraseña" />
              <Button variant="primary" fullWidth>Crear contraseña y entrar</Button>
            </div>
          </AuthCard>
        </Section>

        <Section label="03 · Recuperar contraseña">
          <AuthCard>
            <H>Recupera tu contraseña</H>
            <div style={{ display: 'grid', gap: 16 }}>
              <Input label="Correo electrónico" type="email" placeholder="tucorreo@correo.com" helpText="Te enviaremos un enlace para restablecerla." />
              <Button variant="primary" fullWidth>Enviar enlace</Button>
            </div>
          </AuthCard>
        </Section>

        <Section label="04 · Enlace enviado">
          <AuthCard>
            <div style={{ textAlign: 'center' }}>
              <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 56, height: 56, borderRadius: '50%', background: 'var(--unx-green-tint)', color: 'var(--unx-green)', marginBottom: 12 }}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16v16H4z" fill="none"/><path d="m22 6-10 7L2 6"/></svg>
              </span>
              <h1 style={{ margin: 0, font: 'var(--unx-h2)', color: 'var(--unx-ink)' }}>Revisa tu correo</h1>
              <p style={{ margin: '8px 0 20px', font: 'var(--unx-body)', color: 'var(--unx-text-muted)' }}>Te enviamos un enlace a f•••@correo.com para restablecer tu contraseña. Es válido durante 60 minutos.</p>
              <Button variant="secondary" fullWidth>Volver a iniciar sesión</Button>
            </div>
          </AuthCard>
        </Section>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
init();
</script>
</body>
</html>
