<!-- @dsCard group="Pantallas" viewport="390x844" name="Diseño 22 — Onboarding de la alumna" subtitle="Alumna · Móvil · armada con componentes" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Diseño 22 — Onboarding de la alumna</title>
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--unx-bg); }
  body { font-family: var(--unx-font-sans); color: var(--unx-text); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="_load.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
async function init() {
  const { Input, Button } = await UNXScreen.load(['Input', 'Button']);

  const Stage = ({ children }) => <div style={{ display: 'flex', flexWrap: 'wrap', gap: 32, padding: '24px 40px 48px', alignItems: 'flex-start' }}>{children}</div>;
  const Cell = ({ label, children }) => (
    <div>
      <div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 12, letterSpacing: '0.06em', color: 'var(--unx-text-muted)', textTransform: 'uppercase', marginBottom: 10 }}>{label}</div>
      {children}
    </div>
  );
  const Phone = ({ children }) => <div style={{ width: 390, height: 780, background: 'var(--unx-surface)', border: '1px solid var(--unx-border-strong)', borderRadius: 28, boxShadow: 'var(--unx-shadow-md)', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>{children}</div>;
  const Steps = ({ cur }) => <div style={{ display: 'flex', gap: 6, padding: '20px 24px 8px' }}>{[0, 1, 2, 3, 4].map((i) => <span key={i} style={{ flex: 1, height: 5, borderRadius: 3, background: i <= cur ? 'var(--unx-blue)' : 'var(--unx-border)' }} />)}</div>;
  const Body = ({ children }) => <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '16px 24px 24px', overflow: 'auto' }}>{children}</div>;
  const H = ({ children }) => <h1 style={{ font: 'var(--unx-h1)', color: 'var(--unx-ink)', margin: '0 0 8px' }}>{children}</h1>;
  const Chip = ({ children, sel }) => <span style={{ display: 'inline-block', padding: '8px 14px', borderRadius: 999, border: `1.5px solid ${sel ? 'var(--unx-blue)' : 'var(--unx-border)'}`, background: sel ? 'var(--unx-blue-tint)' : '#fff', color: sel ? 'var(--unx-blue)' : 'var(--unx-text)', fontWeight: 600, fontSize: 14, margin: '0 8px 8px 0' }}>{sel ? '✓ ' : ''}{children}</span>;

  function App() {
    return (
      <Stage>
        <Cell label="1 · Bienvenida"><Phone><Steps cur={0} /><Body>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center' }}>
            <img src="../assets/illustrations/caja-examenes.svg" alt="" style={{ width: 130, marginBottom: 24 }} />
            <h1 style={{ font: 'var(--unx-h1)', color: 'var(--unx-ink)', margin: '0 0 8px' }}>¡Hola, Fernanda! Vamos a preparar tu camino a la universidad</h1>
            <p style={{ font: 'var(--unx-body)', color: 'var(--unx-text-muted)', margin: 0 }}>Configura tu meta en menos de un minuto.</p>
          </div>
          <Button variant="primary" fullWidth>Comenzar</Button>
        </Body></Phone></Cell>

        <Cell label="2 · Institución"><Phone><Steps cur={1} /><Body>
          <H>¿A qué universidad quieres entrar?</H>
          <div style={{ margin: '12px 0 16px' }}><Input label="Institución" value="Universidad de Guadalajara (UDG)" helpText="Escríbela con tus palabras; no necesitas elegirla de una lista." /></div>
          <div style={{ flex: 1 }} />
          <Button variant="primary" fullWidth>Continuar</Button>
        </Body></Phone></Cell>

        <Cell label="3 · Carrera y meta"><Phone><Steps cur={2} /><Body>
          <H>¿Qué carrera y qué puntaje necesitas?</H>
          <div style={{ margin: '12px 0 20px' }}><Input label="Carrera" value="Medicina" helpText="Escribe la carrera a la que vas a aplicar." /></div>
          <div style={{ font: 'var(--unx-small)', fontWeight: 600, color: 'var(--unx-ink)', marginBottom: 6 }}>Puntaje objetivo</div>
          <div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 44, color: 'var(--unx-blue)', fontVariantNumeric: 'tabular-nums' }}>1150</div>
          <div style={{ position: 'relative', height: 8, borderRadius: 4, background: 'var(--unx-border)', margin: '10px 0 4px' }}><div style={{ width: '75%', height: '100%', background: 'var(--unx-blue)', borderRadius: 4 }} /><span style={{ position: 'absolute', left: '75%', top: -5, width: 18, height: 18, borderRadius: '50%', background: 'var(--unx-blue)', transform: 'translateX(-50%)', border: '3px solid #fff', boxShadow: 'var(--unx-shadow-sm)' }} /></div>
          <div style={{ display: 'flex', justifyContent: 'space-between', font: 'var(--unx-caption)', color: 'var(--unx-text-muted)' }}><span>700</span><span>1300</span></div>
          <p style={{ font: 'var(--unx-small)', color: 'var(--unx-text-muted)', flex: 1 }}>Tú decides tu meta; como referencia, usa el puntaje de corte que publica tu institución. Puedes cambiarla después en tu perfil.</p>
          <Button variant="primary" fullWidth>Continuar</Button>
        </Body></Phone></Cell>

        <Cell label="4 · Módulos (opcional)"><Phone><Steps cur={3} /><Body>
          <H>¿Tu admisión pide módulos del EXANI II?</H>
          <p style={{ font: 'var(--unx-small)', color: 'var(--unx-text-muted)', margin: '0 0 16px' }}>Opcional — puedes saltar este paso.</p>
          <div style={{ flex: 1 }}>
            <Chip sel>Biología</Chip><Chip sel>Ciencias de la salud</Chip><Chip>Matemáticas financieras</Chip><Chip>Ciencias sociales</Chip><Chip>Ciencias exactas</Chip><Chip>Humanidades</Chip>
          </div>
          <Button variant="primary" fullWidth>Continuar</Button>
          <div style={{ textAlign: 'center', marginTop: 10 }}><a href="#" style={{ font: 'var(--unx-small)', color: 'var(--unx-text-muted)', textDecoration: 'none' }}>Omitir</a></div>
        </Body></Phone></Cell>

        <Cell label="5 · ¡Todo listo!"><Phone><Steps cur={4} /><Body>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center' }}>
            <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 84, height: 84, borderRadius: '50%', background: 'var(--unx-green-tint)', color: 'var(--unx-green)', marginBottom: 20 }}><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
            <h1 style={{ font: 'var(--unx-h1)', color: 'var(--unx-ink)', margin: '0 0 8px' }}>¡Todo listo, Fernanda!</h1>
            <p style={{ font: 'var(--unx-body)', color: 'var(--unx-text-muted)', margin: 0 }}>Tu meta: <b style={{ color: 'var(--unx-ink)' }}>1150</b> para Medicina en la UDG.</p>
          </div>
          <Button variant="primary" fullWidth>Ir a mi inicio</Button>
        </Body></Phone></Cell>
      </Stage>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
init();
</script>
</body>
</html>
