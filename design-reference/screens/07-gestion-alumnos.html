<!-- @dsCard group="Pantallas" viewport="1440x900" name="Diseño 07 — Gestión de alumnos" subtitle="Administradora · Desktop · armada con componentes" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Diseño 07 — Gestión de alumnos</title>
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--unx-bg); }
  body { font-family: var(--unx-font-sans); color: var(--unx-text); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="_load.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const MAYRA = [
  { id: 'inicio', label: 'Inicio', icon: 'inicio' },
  { id: 'alumnos', label: 'Alumnos', icon: 'alumnos' },
  { id: 'grupos', label: 'Grupos', icon: 'grupos' },
  { id: 'permisos', label: 'Usuarios y permisos', icon: 'permisos' },
  { id: 'temario', label: 'Temario', icon: 'temario' },
  { id: 'resumen', label: 'Resumen de exámenes', icon: 'resumen' },
];

async function init() {
  const C = await UNXScreen.load(['SidebarNav', 'PageHeader', 'SearchInput', 'Select', 'DataTable', 'Badge', 'Button', 'Modal', 'Input', 'MultiSelect', 'Alert']);
  const { SidebarNav, PageHeader, SearchInput, Select, DataTable, Badge, Button, Modal, Input, MultiSelect, Alert } = C;

  const Label = ({ children }) => (
    <div style={{ fontFamily: 'var(--unx-font-condensed)', fontWeight: 600, fontSize: 13, letterSpacing: '0.06em', color: 'var(--unx-text-muted)', textTransform: 'uppercase', padding: '0 40px 10px' }}>{children}</div>
  );
  const Shell = ({ active = 'alumnos', children }) => (
    <div style={{ position: 'relative', display: 'flex', height: 860, background: 'var(--unx-bg)', overflow: 'hidden', border: '1px solid var(--unx-border)' }}>
      <SidebarNav user={{ name: 'Mayra Torres', role: 'Administradora' }} items={MAYRA} activeId={active} />
      <main style={{ flex: 1, overflow: 'auto', padding: 32 }}>{children}</main>
    </div>
  );
  const iconBtn = (path, color = 'var(--unx-text-muted)') => (
    <button type="button" style={{ display: 'inline-flex', width: 34, height: 34, alignItems: 'center', justifyContent: 'center', border: '1px solid var(--unx-border)', borderRadius: 8, background: '#fff', color, cursor: 'pointer', marginRight: 6 }}>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">{path}</svg>
    </button>
  );
  const editIcon = <><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></>;
  const banIcon = <><circle cx="12" cy="12" r="9"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/></>;

  const estado = (s) => s === 'ACTIVO' ? <Badge variant="success">Activo</Badge> : <Badge variant="neutral">Inactivo</Badge>;
  const acciones = <span style={{ whiteSpace: 'nowrap' }}>{iconBtn(editIcon, 'var(--unx-blue)')}{iconBtn(banIcon)}</span>;
  const COLS = [
    { key: 'nombre', label: 'Nombre', sortable: true },
    { key: 'correo', label: 'Correo' },
    { key: 'grupo', label: 'Grupo' },
    { key: 'estado', label: 'Estado' },
    { key: 'acceso', label: 'Último acceso' },
    { key: 'acciones', label: 'Acciones', align: 'right' },
  ];
  const R = (n, c, g, e, a) => ({ nombre: <span style={{ fontWeight: 600, color: 'var(--unx-ink)' }}>{n}</span>, correo: <span style={{ color: 'var(--unx-text-muted)' }}>{c}</span>, grupo: g, estado: estado(e), acceso: <span style={{ color: 'var(--unx-text-muted)' }}>{a}</span>, acciones });
  const ROWS = [
    R('Ana López Ramírez', 'ana.lopez@correo.com', 'Matutino A', 'ACTIVO', 'hace 2 días'),
    R('Diego Martín Soto', 'diego.soto@correo.com', 'Matutino A', 'ACTIVO', 'hace 3 días'),
    R('Valeria Cruz Núñez', 'valeria.cruz@correo.com', 'Vespertino B', 'ACTIVO', 'hace 1 día'),
    R('Emiliano Ríos Paz', 'emiliano.rios@correo.com', 'Sabatino C', 'ACTIVO', 'hace 5 días'),
    R('Regina Ávila Mora', 'regina.avila@correo.com', 'Vespertino B', 'ACTIVO', 'hace 4 días'),
    R('Santiago Herrera Luna', 'santiago.herrera@correo.com', 'Matutino A', 'INACTIVO', 'hace 3 semanas'),
    R('Fernanda Gutiérrez Peña', 'fernanda.gtz@correo.com', 'Sabatino C', 'ACTIVO', 'Nunca'),
    R('Ximena Salazar Ortiz', 'ximena.salazar@correo.com', 'Matutino A', 'ACTIVO', 'hace 6 días'),
  ];
  const GRUPOS = [{ value: 'todos', label: 'Todos los grupos' }, { value: 'ma', label: 'Matutino A' }, { value: 'vb', label: 'Vespertino B' }, { value: 'sc', label: 'Sabatino C' }];
  const ESTADOS = [{ value: 'todos', label: 'Estado: todos' }, { value: 'act', label: 'Activos' }, { value: 'ina', label: 'Inactivos' }];

  const importarBtn = <Button variant="secondary" icon={<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M4 21h16"/></svg>}>Importar CSV</Button>;

  const Filtros = ({ search }) => (
    <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
      <div style={{ flex: 1, maxWidth: 320 }}><SearchInput placeholder="Buscar por nombre…" value={search} fullWidth /></div>
      <div style={{ width: 200 }}><Select options={GRUPOS} value="todos" /></div>
      <div style={{ width: 180 }}><Select options={ESTADOS} value="todos" /></div>
    </div>
  );

  function App() {
    return (
      <div style={{ display: 'grid', gap: 40, padding: '24px 0 48px' }}>
        <div>
          <Label>01 · Alumnos · tabla con filtros</Label>
          <Shell>
            <PageHeader title="Alumnos" subtitle="246 alumnos" actionLabel="Agregar alumno">{importarBtn}</PageHeader>
            <Filtros />
            <DataTable columns={COLS} rows={ROWS} page={1} pageCount={31} />
          </Shell>
        </div>

        <div>
          <Label>02 · Modal "Agregar alumno"</Label>
          <Shell>
            <PageHeader title="Alumnos" subtitle="246 alumnos" actionLabel="Agregar alumno">{importarBtn}</PageHeader>
            <Filtros />
            <DataTable columns={COLS} rows={ROWS.slice(0, 4)} />
            <Modal contained title="Agregar alumno"
              actions={<><Button variant="secondary">Cancelar</Button><Button variant="primary">Agregar y enviar invitación</Button></>}>
              <div style={{ display: 'grid', gap: 16 }}>
                <Input label="Nombre completo" placeholder="Nombre y apellidos" />
                <Input label="Correo electrónico" type="email" placeholder="alumno@correo.com" />
                <Select label="Grupo" placeholder="Elige un grupo" options={GRUPOS.slice(1)} />
                <Alert variant="info">Al guardar se enviará un correo de invitación para que el alumno cree su contraseña.</Alert>
              </div>
            </Modal>
          </Shell>
        </div>

        <div>
          <Label>03 · Búsqueda sin resultados</Label>
          <Shell>
            <PageHeader title="Alumnos" subtitle="246 alumnos" actionLabel="Agregar alumno">{importarBtn}</PageHeader>
            <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
              <div style={{ flex: 1, maxWidth: 320 }}><SearchInput placeholder="Buscar por nombre…" value="Renata Solís" fullWidth /></div>
              <div style={{ width: 200 }}><Select options={GRUPOS} value="todos" /></div>
              <div style={{ width: 180 }}><Select options={ESTADOS} value="todos" /></div>
            </div>
            <DataTable columns={COLS} rows={[]} emptyTitle="No encontramos alumnos con ese nombre" emptyText="Revisa la escritura o limpia la búsqueda para ver a todos los alumnos." />
          </Shell>
        </div>

        <div>
          <Label>04 · Confirmación de desactivación</Label>
          <Shell>
            <PageHeader title="Alumnos" subtitle="246 alumnos" actionLabel="Agregar alumno">{importarBtn}</PageHeader>
            <DataTable columns={COLS} rows={ROWS.slice(0, 4)} />
            <Modal contained width={440} title="¿Desactivar a Santiago Herrera?"
              actions={<><Button variant="secondary">Cancelar</Button><Button variant="danger">Desactivar</Button></>}>
              <p style={{ margin: 0, font: 'var(--unx-body)', color: 'var(--unx-text)' }}>El alumno no podrá ingresar; su historial se conserva. Puedes reactivarlo cuando lo necesites.</p>
            </Modal>
          </Shell>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
init();
</script>
</body>
</html>
